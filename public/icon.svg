<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="School timetable icon">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#1d4ed8"/>

  <!-- Header row (days) -->
  <rect x="7" y="8" width="50" height="9" rx="3" fill="#93c5fd"/>

  <!-- Row 1 -->
  <rect x="7"  y="20" width="11" height="8" rx="2" fill="#fbbf24"/>
  <rect x="20" y="20" width="11" height="8" rx="2" fill="#34d399"/>
  <rect x="33" y="20" width="11" height="8" rx="2" fill="#f87171"/>
  <rect x="46" y="20" width="11" height="8" rx="2" fill="#a78bfa"/>

  <!-- Row 2 -->
  <rect x="7"  y="30" width="11" height="8" rx="2" fill="#34d399"/>
  <rect x="20" y="30" width="11" height="8" rx="2" fill="#f87171"/>
  <rect x="33" y="30" width="11" height="8" rx="2" fill="#a78bfa"/>
  <rect x="46" y="30" width="11" height="8" rx="2" fill="#fbbf24"/>

  <!-- Row 3 -->
  <rect x="7"  y="40" width="11" height="8" rx="2" fill="#f87171"/>
  <rect x="20" y="40" width="11" height="8" rx="2" fill="#a78bfa"/>
  <rect x="33" y="40" width="11" height="8" rx="2" fill="#fbbf24"/>
  <rect x="46" y="40" width="11" height="8" rx="2" fill="#34d399"/>

  <!-- Row 4 -->
  <rect x="7"  y="50" width="11" height="7" rx="2" fill="#a78bfa"/>
  <rect x="20" y="50" width="11" height="7" rx="2" fill="#fbbf24"/>
  <rect x="33" y="50" width="11" height="7" rx="2" fill="#34d399"/>
  <rect x="46" y="50" width="11" height="7" rx="2" fill="#f87171"/>
</svg>
